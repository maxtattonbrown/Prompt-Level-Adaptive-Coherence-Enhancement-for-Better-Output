<!DOCTYPE html>
<html>
<head>

<style>

  body {
    margin: 0;
    padding: 0;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 600px;
    height: 600px;
    font-family: 'Inter', sans-serif;
  }

  .acronym {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .row {
    font-size: 42px;
    font-weight: 300;
    color: #24292f;
    line-height: 1.3;
  }

  .row span:first-child {
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="acronym">
    <div class="row"><span>P</span>rompt</div>
    <div class="row"><span>L</span>evel</div>
    <div class="row"><span>A</span>daptive</div>
    <div class="row"><span>C</span>oherence</div>
    <div class="row"><span>E</span>nhancement for</div>
    <div class="row"><span>B</span>etter</div>
    <div class="row"><span>O</span>utput</div>
  </div>
</body>
</html>
